name: ☁️ Deploy to Dev (CD)

on:
  pull_request:
    branches: [main]
    types: [closed] # run when a PR gets closed; we'll guard for "merged" below

permissions:
  contents: write # to create tags
  id-token: write # for OIDC to assume the AWS role

concurrency:
  group: cd-dev
  cancel-in-progress: false

env:
  STAGE: dev
  AWS_REGION: eu-central-1
  APP_DEPLOY_ROLE_TO_ASSUME_ARN: ${{ vars.APP_DEPLOY_ROLE_TO_ASSUME_ARN }}
  CDK_ROLE_TO_ASSUME_ARN: ${{ vars.CDK_ROLE_TO_ASSUME_ARN }}

jobs:
  changes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter-app.outputs.app }}
      infra: ${{ steps.filter-infra.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter-app
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'src/**'
              - 'angular.json'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'eslint.config.js'

      - id: filter-infra
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - '.github/workflows/cd.yml'
              - 'infra/bin/**'
              - 'infra/lib/**'
              - 'infra/package.json'
              - 'infra/package-lock.json'
              - 'infra/tsconfig*.json'

  cdk-deploy:
    needs: [changes]
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials for CDK deploy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.CDK_ROLE_TO_ASSUME_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Deploy CDK stack
        working-directory: infra
        run: |
          npx cdk deploy --all --require-approval never --verbose

  plan-tag:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      new_tag: ${{ steps.next.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide semver bump from labels
        id: bump
        shell: bash
        env:
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          bump=patch
          if echo "$PR_LABELS_JSON" | jq -e '.[] | select(.name=="semver:major")' >/dev/null; then
            bump=major
          elif echo "$PR_LABELS_JSON" | jq -e '.[] | select(.name=="semver:minor")' >/dev/null; then
            bump=minor
          elif echo "$PR_LABELS_JSON" | jq -e '.[] | select(.name=="semver:patch")' >/dev/null; then
            bump=patch
          fi
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Compute next tag
        id: next
        shell: bash
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')"
          VER="${LAST_TAG#v}"
          IFS='.' read -r MA MI PA <<< "${VER}"

          re='^[0-9]+$'
          [[ "$MA" =~ $re ]] || MA=0
          [[ "$MI" =~ $re ]] || MI=0
          [[ "$PA" =~ $re ]] || PA=0

          case "${BUMP}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac

          NEW_TAG="v${MA}.${MI}.${PA}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Add info to job summary
        run: |
          echo "## Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- New tag: ${{ steps.next.outputs.new_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: dev" >> "$GITHUB_STEP_SUMMARY"

  update-config-file:
    needs: [plan-tag, cdk-deploy]
    if: |
      always()
      && needs.plan-tag.outputs.new_tag != ''
      && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      commit_sha: ${{ steps.sha.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.APP_DEPLOY_ROLE_TO_ASSUME_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Cognito config
        id: auth
        shell: bash
        run: |
          set -euo pipefail

          AUTHORITY="$(aws ssm get-parameter \
            --name "/db-accessor-${STAGE}/auth/authority" \
            --query "Parameter.Value" \
            --output text)"

          CLIENT_ID="$(aws ssm get-parameter \
            --name "/db-accessor-${STAGE}/auth/client-id" \
            --query "Parameter.Value" \
            --output text)"

          echo "auth_authority=${AUTHORITY}" >> "$GITHUB_OUTPUT"
          echo "auth_client_id=${CLIENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Update config.json in src/app
        shell: bash
        env:
          NEW_TAG: ${{ needs.plan-tag.outputs.new_tag }}
          AUTHORITY: ${{ steps.auth.outputs.auth_authority }}
          CLIENT_ID: ${{ steps.auth.outputs.auth_client_id }}
        run: |
          set -euo pipefail
          mkdir -p src/app

          CFG="src/app/config.json"

          node -e "
            const fs = require('fs');
            const p = '$CFG';
            const config = fs.existsSync(p) ? JSON.parse(fs.readFileSync(p, 'utf8')) : {};
            config.version = process.env.NEW_TAG;
            config.auth = {
              ...(config.auth ?? {}),
              authority: process.env.AUTHORITY,
              clientId: process.env.CLIENT_ID,
              scope: config.auth?.scope ?? 'openid email profile',
            };
            fs.writeFileSync(p, JSON.stringify(config, null, 2) + '\n');
          "

          git add "$CFG"
          git config user.name  "github-actions"
          git config user.email "<>"
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update src/app/config.json for ${NEW_TAG}"
            # Push back to default branch (main)
            git push origin main
          else
            echo "No changes to commit for $CFG"
          fi

      - name: Expose commit SHA
        id: sha
        shell: bash
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  tag-release:
    needs: [changes, plan-tag, update-config-file]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ needs.plan-tag.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Create + push tag on version commit
        shell: bash
        env:
          NEW_TAG: ${{ needs.plan-tag.outputs.new_tag }}
          TARGET_SHA: ${{ needs.update-config-file.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions"
          git config user.email "<>"

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "Tag ${NEW_TAG} already exists; skipping push."
            exit 0
          fi

          git tag -a "${NEW_TAG}" "${TARGET_SHA}" -m "release: ${NEW_TAG}"
          git push origin "${NEW_TAG}"

  build-deploy:
    needs: [tag-release, cdk-deploy]
    if: |
      always()
      && needs.tag-release.result == 'success'
      && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      dist_dir: ${{ steps.dist.outputs.dir }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag-release.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npx ng build --configuration production

      - name: Resolve dist path
        id: dist
        shell: bash
        run: |
          # heuristics to find the actual dist folder:
          if [ -d "dist" ]; then
            SUB=$(ls -1 dist | head -n 1 || true)
            if [ -n "$SUB" ] && [ -d "dist/$SUB/browser" ]; then
              echo "dir=dist/$SUB/browser" >> "$GITHUB_OUTPUT"
            elif [ -n "$SUB" ] && [ -d "dist/$SUB" ]; then
              echo "dir=dist/$SUB" >> "$GITHUB_OUTPUT"
            else
              echo "dir=dist" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "dist/ not found"; exit 1
          fi
          echo "Using dist dir: $(cat $GITHUB_OUTPUT)"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.APP_DEPLOY_ROLE_TO_ASSUME_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS deployment targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail

          BUCKET="$(aws ssm get-parameter \
            --name "/db-accessor-ui-${STAGE}/static-site/bucket-name" \
            --query "Parameter.Value" \
            --output text)"

          DISTRIBUTION_ID="$(aws ssm get-parameter \
            --name "/db-accessor-infra-${STAGE}/cloudfront/distribution-id" \
            --query "Parameter.Value" \
            --output text 2>/dev/null || true)"

          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "distribution_id=${DISTRIBUTION_ID}" >> "$GITHUB_OUTPUT"

      - name: Upload static assets (immutable)
        run: |
          aws s3 sync "${{ steps.dist.outputs.dir }}/" "s3://${{ steps.targets.outputs.bucket }}/" \
            --delete \
            --exclude "index.html" \
            --exclude "config.json" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp "${{ steps.dist.outputs.dir }}/index.html" "s3://${{ steps.targets.outputs.bucket }}/index.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Upload config.json (no-cache)
        run: |
          aws s3 cp "${{ steps.dist.outputs.dir }}/config.json" "s3://${{ steps.targets.outputs.bucket }}/config.json" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "application/json; charset=utf-8"

      - name: Invalidate CloudFront
        if: steps.targets.outputs.distribution_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.targets.outputs.distribution_id }}" \
            --paths "/*"

      - name: Skip CloudFront invalidation
        if: steps.targets.outputs.distribution_id == ''
        run: |
          echo "CloudFront distribution SSM parameter is missing; skipped invalidation." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact for release
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ steps.dist.outputs.dir }}

  github-release:
    needs: [tag-release, build-deploy]
    if: needs.tag-release.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - run: zip -r "dist-${{ needs.tag-release.outputs.new_tag }}.zip" dist

      - name: Create GitHub Release with build artifacts
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.tag-release.outputs.new_tag }}
          name: ${{ needs.tag-release.outputs.new_tag }}
          draft: false
          prerelease: false
          files: |
            dist-${{ needs.tag-release.outputs.new_tag }}.zip
